name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
      # The taskboard example is a standalone project consuming tenchi as
      # a path dependency; it gets its own environment and checks.
      - run: uv run --directory examples/taskboard pytest
      - run: uv run --directory examples/taskboard pyright
      - run: uv run --directory examples/taskboard tenchi doctor
