name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - name: Check tag matches project version
        if: github.ref_type == 'tag'
        run: |
          version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project version v${version}"
            exit 1
          fi
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
      - name: Check todos OpenAPI snapshot
        run: >-
          uv run --directory examples/todos tenchi openapi
          --routes app.server.routes:api_routes
          --title Todos --version 0.1.0
          --check openapi.json
      - run: uv run --directory examples/taskboard pytest
      - run: uv run --directory examples/taskboard pyright
      - run: uv run --directory examples/taskboard tenchi doctor
      - name: Check taskboard OpenAPI snapshot
        run: >-
          uv run --directory examples/taskboard tenchi openapi
          --routes app.server.routes:api_routes
          --title Taskboard --version 0.1.0
          --security '{"bearerAuth":{"type":"http","scheme":"bearer"}}'
          --check openapi.json
      - run: uv build
      - name: Smoke-test the built wheel and generated app
        run: |
          smoke_dir=$(mktemp -d)
          wheel=$(find "$GITHUB_WORKSPACE/dist" -name '*.whl' -print -quit)
          uv venv "$smoke_dir/venv"
          uv pip install --python "$smoke_dir/venv/bin/python" "$wheel"
          cd "$smoke_dir"
          "$smoke_dir/venv/bin/tenchi" new generated_app
          cd "$smoke_dir/generated_app"
          uv add "$wheel"
          uv run tenchi make feature notes
          uv run tenchi make use-case notes create_note
          uv run tenchi check
      - run: uv publish --trusted-publishing always
